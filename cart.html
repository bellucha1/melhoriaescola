<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho de Compras</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <h1>Loja de Detectores de Circuito</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="cart.html">Carrinho</a></li>
      </ul>
    </nav>
  </header>

  <section class="cart">
    <h2>Seu Carrinho</h2>
    <ul id="cart-items"></ul>
    <div id="total">
      <h3>Total: R$ <span id="total-value">0.00</span></h3>
    </div>
    <button id="checkout-button">Finalizar Compra</button>
  </section>

  <footer>
    <p>&copy; 2026 Loja de Detectores de Circuito. Todos os direitos reservados.</p>
  </footer>

  <script src="scripts.js"></script>
  <script>
    // Função para exibir itens do carrinho
    window.addEventListener('load', function() {
      const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
      const cartList = document.getElementById('cart-items');
      const totalValue = document.getElementById('total-value');

      let total = 0;
      cartItems.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.product} - R$ ${item.price.toFixed(2)}`;
        cartList.appendChild(li);
        total += item.price;
      });

      totalValue.textContent = total.toFixed(2);
    });
  </script>
</body>
</html>
