<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho de Compras</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <h1>Loja de Detectores de Circuito</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="cart.html">Carrinho</a></li>
      </ul>
    </nav>
  </header>

  <!-- CARRINHO -->
  <section class="cart">
    <h2>Seu Carrinho</h2>
    <div class="cart-container" id="cart-items">
      <!-- Itens do carrinho serão gerados dinamicamente -->
    </div>

    <div id="total">
      <h3>Total: R$ <span id="total-value">0.00</span></h3>
    </div>

    <button id="checkout-button">Finalizar Compra</button>
    <a href="index.html" class="cta-button">Continuar Comprando</a>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Loja de Detectores de Circuito. Todos os direitos reservados.</p>
  </footer>

  <!-- SCRIPT -->
  <script src="cart.js"></script>

</body>
</html>
