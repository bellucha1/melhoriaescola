<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CircuitoSeguro - Detectores de Circuito</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <h1>CircuitoSeguro</h1>
    </div>
    <nav>
      <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Produtos</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Contato</a></li>
        <li><a href="cart.html">Carrinho (0)</a></li>
      </ul>
    </nav>
  </header>

  <!-- BANNER -->
  <section class="banner">
    <h2>Detectores de Circuito para Eletrodomésticos</h2>
    <p>Encontre os melhores produtos para testar seus aparelhos!</p>
    <a href="#products" class="cta-button">Compre Agora</a>
  </section>

  <!-- BUSCA E FILTRO -->
  <section class="search-filter">
    <input type="text" id="search" placeholder="Buscar produto...">
    <select id="filter">
      <option value="all">Todos</option>
      <option value="199.99">Até R$199,99</option>
      <option value="250.00">Até R$250,00</option>
    </select>
  </section>

  <!-- LISTA DE PRODUTOS -->
  <section class="product-list" id="products">
    <h2>Produtos em Destaque</h2>
    <div class="products-container">
      <!-- Produtos serão gerados via JavaScript -->
    </div>
  </section>

  <!-- MODAL DE PRODUTO -->
  <div id="product-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3 id="modal-title"></h3>
      <img id="modal-img" src="" alt="">
      <p id="modal-price"></p>
      <button id="modal-add-to-cart">Adicionar ao Carrinho</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 CircuitoSeguro. Todos os direitos reservados.</p>
  </footer>

  <!-- SCRIPT -->
  <script src="scripts.js"></script>
</body>
</html>
